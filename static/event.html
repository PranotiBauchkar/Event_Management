<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Event Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script>
      tailwind = { config: { theme: { extend: { colors: { brand: '#7c3aed', accent: '#f59e0b' } } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 1000;">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">EventHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenuEvent">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenuEvent">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
            <li class="nav-item"><a class="nav-link" href="calendar.html">Calendar</a></li>
            <li class="nav-item"><a class="nav-link" href="chat.html">Support</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard/index.html">Dashboard</a></li>
            <li class="nav-item"><a class="btn btn-primary rounded-pill px-4" href="login.html" style="background: #7c3aed; border: none;">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="pt-24 pb-12">
      <section class="relative overflow-hidden">
        <div id="eventHero" class="bg-slate-900 text-white py-20 animate-fade-in" style="background-size: cover; background-position: center;"></div>
      </section>

      <section class="container py-6">
        <div class="row g-4">
          <div class="col-lg-8">
            <div class="card p-4 mb-4 reveal-left">
              <h1 id="eventTitle" class="h3 fw-bold"></h1>
              <p id="eventDescription" class="text-muted"></p>
            </div>
            <div class="card p-4 mb-4 reveal-left stagger-1">
              <h2 class="h5 fw-semibold mb-3">Venue</h2>
              <p id="eventVenue" class="mb-1"></p>
              <p id="eventAddress" class="text-muted"></p>
            </div>
            <div class="card p-4 reveal-left stagger-2">
              <h2 class="h5 fw-semibold mb-3">Reviews</h2>
              <div id="eventReviews" class="space-y-3"></div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card p-4 mb-4 reveal-right">
              <h2 class="h5 fw-semibold mb-4">Booking Details</h2>
              <div class="mb-3">
                <strong>Date:</strong> <span id="eventDate"></span>
              </div>
              <div class="mb-3">
                <strong>Location:</strong> <span id="eventCity"></span>
              </div>
              <div class="mb-3">
                <strong>Price:</strong> <span id="eventPrice"></span>
              </div>
              <div class="mb-3">
                <strong>Seats left:</strong> <span id="eventSeats"></span>
              </div>
              <a id="bookLink" class="btn btn-primary w-100" href="#">Book Tickets</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-5 bg-slate-900 text-white text-center">
      <div class="container">© 2026 EventHub. Built with HTML, CSS, and JavaScript.</div>
    </footer>

    <script>
      // Get event ID from URL and set book link
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get('id');
      if (eventId) {
        document.getElementById('bookLink').href = `booking.html?id=${eventId}`;
      }
    </script>
    <script src="data.js"></script>
    <script src="static.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
