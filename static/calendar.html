<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script>
      tailwind = { config: { theme: { extend: { colors: { brand: '#7c3aed', accent: '#f59e0b' } } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 1000;">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">EventHub</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenuCalendar">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenuCalendar">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="calendar.html">Calendar</a></li>
            <li class="nav-item"><a class="nav-link" href="chat.html">Support</a></li>
            <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="dashboard/index.html">Dashboard</a></li>
            <li class="nav-item"><a class="btn btn-primary rounded-pill px-4" href="login.html" style="background: #7c3aed; border: none;">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="pt-24 pb-12">
      <section class="container py-6">
        <div class="mb-5 animate-fade-in-up">
          <span class="badge rounded-pill bg-primary px-3 py-2 mb-3">Events Calendar</span>
          <h1 class="display-6 fw-bold">Select a date to see upcoming events</h1>
          <p class="text-muted">Navigate the month and find which events are scheduled on each day.</p>
        </div>

        <div class="row g-4">
          <div class="col-lg-8 reveal-left">
            <div class="card p-4">
              <div class="d-flex align-items-center justify-content-between mb-4">
                <button id="prevMonth" class="btn btn-outline-primary">Previous</button>
                <div>
                  <h2 class="h5 mb-1" id="calendarTitle"></h2>
                </div>
                <button id="nextMonth" class="btn btn-outline-primary">Next</button>
              </div>
              <div id="calendarWeekdays" class="row text-center text-muted small fw-bold"></div>
              <div id="calendarDays" class="row g-1 mt-2"></div>
            </div>
          </div>
          <div class="col-lg-4 reveal-right">
            <div class="card p-4">
              <h2 class="h5 mb-4">Events on Selected Date</h2>
              <div id="calendarEvents" class="space-y-3"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="py-5 bg-slate-900 text-white text-center">
      <div class="container">© 2026 EventHub. Built with HTML, CSS, and JavaScript.</div>
    </footer>

    <script src="data.js"></script>
    <script src="static.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
