<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
</head>
<body>
  <h1>EventHub Test Page</h1>
  <p>If you can see this, the static folder is working correctly.</p>
  
  <h2>Test Links:</h2>
  <ul>
    <li><a href="index.html">Home Page</a></li>
    <li><a href="login.html">Login Page</a></li>
    <li><a href="events.html">Events Page</a></li>
    <li><a href="dashboard/index.html">User Dashboard</a></li>
    <li><a href="organizer/index.html">Organizer Dashboard</a></li>
    <li><a href="admin/index.html">Admin Dashboard</a></li>
  </ul>
  
  <h2>Test Login:</h2>
  <button onclick="testLogin('user')">Test User Login</button>
  <button onclick="testLogin('organizer')">Test Organizer Login</button>
  <button onclick="testLogin('admin')">Test Admin Login</button>
  
  <h2>Current Login Status:</h2>
  <div id="status"></div>
  
  <script>
    function testLogin(role) {
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userEmail', 'test@example.com');
      localStorage.setItem('userRole', role);
      
      document.getElementById('status').innerHTML = `
        <p>Logged in as: ${role}</p>
        <p>Email: test@example.com</p>
        <p>Redirecting to dashboard...</p>
      `;
      
      setTimeout(() => {
        if (role === 'user') {
          window.location.href = 'dashboard/index.html';
        } else if (role === 'organizer') {
          window.location.href = 'organizer/index.html';
        } else if (role === 'admin') {
          window.location.href = 'admin/index.html';
        }
      }, 2000);
    }
    
    // Check current status
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const userRole = localStorage.getItem('userRole');
    const userEmail = localStorage.getItem('userEmail');
    
    if (isLoggedIn) {
      document.getElementById('status').innerHTML = `
        <p><strong>Currently Logged In:</strong></p>
        <p>Role: ${userRole}</p>
        <p>Email: ${userEmail}</p>
      `;
    } else {
      document.getElementById('status').innerHTML = '<p>Not logged in</p>';
    }
  </script>
</body>
</html>
