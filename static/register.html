<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script>
      tailwind = { config: { theme: { extend: { colors: { brand: '#7c3aed', accent: '#f59e0b' } } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-900 text-white">
    <main class="min-vh-100 d-flex align-items-center justify-content-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="glass-card p-5 animate-scale-in">
              <h1 class="h3 fw-bold mb-3">Create an account</h1>
              <p class="text-white/80 mb-4">Register to book events and manage your tickets.</p>
              <form id="registerForm" class="mb-4">
                <div class="mb-3">
                  <label class="form-label text-white">Full Name</label>
                  <input id="registerName" type="text" class="form-control" placeholder="John Doe" required />
                </div>
                <div class="mb-3">
                  <label class="form-label text-white">Email</label>
                  <input id="registerEmail" type="email" class="form-control" placeholder="you@example.com" required />
                </div>
                <div class="mb-3">
                  <label class="form-label text-white">Password</label>
                  <input id="registerPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
              </form>
              <div class="text-center text-white/70">
                Already have an account? <a href="login.html" class="text-primary">Login</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="py-4 text-center text-white/70">
      © 2026 EventHub.
    </footer>
    <script src="static.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
