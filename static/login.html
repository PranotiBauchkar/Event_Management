<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script>
      tailwind = { config: { theme: { extend: { colors: { brand: '#7c3aed', accent: '#f59e0b' } } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-slate-900 text-white">
    <main class="min-vh-100 d-flex align-items-center justify-content-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="glass-card p-5 animate-scale-in">
              <h1 class="h3 fw-bold mb-3">Sign in to EventHub</h1>
              <p class="text-white/80 mb-4">Enter your credentials to continue to the event platform.</p>
              <form id="loginForm" class="mb-4">
                <div class="mb-3">
                  <label class="form-label text-white">Email</label>
                  <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" required />
                </div>
                <div class="mb-3 position-relative">
                  <label class="form-label text-white">Password</label>
                  <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required />
                </div>
                <div class="mb-3">
                  <label class="form-label text-white">Login as</label>
                  <select id="loginRole" class="form-select bg-white text-dark">
                    <option value="user">User</option>
                    <option value="organizer">Organizer</option>
                    <option value="admin">Admin</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
              </form>
              <div class="text-center text-white/70">
                Don't have an account? <a href="register.html" class="text-primary">Register</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer class="py-4 text-center text-white/70">
      © 2026 EventHub.
    </footer>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
          loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const role = document.getElementById('loginRole').value;
            
            console.log('Login attempt:', { email, role });
            
            // Simulate login and redirect based on role
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userRole', role);
            
            console.log('Redirecting to dashboard for role:', role);
            
            // Redirect to appropriate dashboard
            if (role === 'user') {
              window.location.href = 'dashboard/index.html';
            } else if (role === 'organizer') {
              window.location.href = 'organizer/index.html';
            } else if (role === 'admin') {
              window.location.href = 'admin/index.html';
            }
          });
        } else {
          console.error('Login form not found');
        }
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
